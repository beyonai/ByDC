name: Publish PyPI

on:
  push:
    tags:
      - "by-datacloud-v*"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v4

      - name: Build distributions
        run: uv build

      - uses: actions/upload-artifact@v4
        with:
          name: by-datacloud-dist
          path: dist/*

  publish:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      id-token: write
    environment:
      name: pypi
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: by-datacloud-dist
          path: dist

      - uses: pypa/gh-action-pypi-publish@release/v1
