name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
      - master

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.12"
  UV_LINK_MODE: copy
  FORCE_COLOR: "1"

jobs:
  ci:
    name: ci
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v4

      - name: Restore uv cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ env.PYTHON_VERSION }}-${{ hashFiles('uv.lock', '**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-uv-${{ env.PYTHON_VERSION }}-

      - name: Sync workspace dependencies
        run: uv sync --frozen --all-packages

      - name: Check root formatting
        run: uv run --frozen --all-packages ruff format src/by_datacloud packages --check

      - name: Run root lint
        run: uv run --frozen --all-packages ruff check src/by_datacloud packages

      - name: Run mypy
        run: uv run --frozen --all-packages mypy src/by_datacloud packages
