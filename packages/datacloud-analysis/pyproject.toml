[project]
name = "datacloud-analysis"
version = "0.1.0"
description = "DataCloud Agent - 超级分析智能体"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [
    { name = "Whale DataCloud Team" }
]
keywords = ["agent", "langgraph", "ai", "analysis"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
]

dependencies = [
    "langgraph>=1.0.10",
    "langgraph-checkpoint-postgres>=2.0.0",
    "langchain>=0.3.0",
    "langchain-core>=0.3.0",
    "langchain-openai>=1.1.10",
    "pydantic>=2.0",
    "pydantic-settings>=2.0",
    "psycopg[binary,pool]>=3.1",
    "httpx>=0.27",
    "datacloud-knowledge",
    "datacloud-data[sql]",
    "datacloud-memory",
    "pyyaml>=6.0.3",
    "deepagents>=0.4.7",
    "by-framework>=0.1.2",
]

[dependency-groups]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "pytest-mock>=3.14",
    "pytest-cov>=5.0",
]

[project.scripts]
datacloud-analysis = "datacloud_analysis.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/datacloud_analysis"]

[tool.uv.sources]
# 声明 workspace 依赖来源
datacloud-knowledge = { workspace = true }
datacloud-data = { workspace = true }
datacloud-memory = { workspace = true }

[tool.uv]
default-groups = ["dev"]

# ============================================
# Ruff 配置
# ============================================
[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "UP", "B", "C4", "SIM", "ASYNC"]
ignore = ["E501"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

# ============================================
# MyPy 配置
# ============================================
[tool.mypy]
python_version = "3.11"
strict = true
warn_return_any = true
ignore_missing_imports = true

# ============================================
# Pytest 配置
# ============================================
[tool.pytest.ini_options]
pythonpath = ["src"]
testpaths = ["tests/dca"]
asyncio_mode = "auto"
markers = [
    "integration: marks tests as integration tests (deselect with '-m \"not integration\"')",
    "e2e: marks tests as end-to-end tests (deselect with '-m \"not e2e\"')",
]
# 仅跑 unit 测试：pytest -m "not integration and not e2e"
addopts = "--tb=short"

# ============================================
# Coverage 配置（pytest-cov / coverage.py）
# ============================================
[tool.coverage.run]
source = ["src/datacloud_analysis"]
branch = true                          # 开启分支覆盖（if/else 两个方向都要走到）
omit = [
    "*/tests/*",
    "*/__init__.py",
]

[tool.coverage.report]
fail_under = 90                        # 行覆盖率低于 90% 时 CI 报错
show_missing = true                    # 终端输出未覆盖的行号
skip_covered = false
exclude_lines = [
    "pragma: no cover",
    "if TYPE_CHECKING:",
    "raise NotImplementedError",
    "@overload",
    "^\\s*\\.\\.\\.\\s*$",            # 纯省略号行（抽象方法占位）
]
