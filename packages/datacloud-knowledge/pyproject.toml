[project]
name = "datacloud-knowledge"
version = "0.1.0"
description = "DataCloud Knowledge Service - 知识检索与查询计划生成服务"
readme = "README.md"
requires-python = ">=3.12"
license = { text = "MIT" }
authors = [
    { name = "Whale DataCloud Team" }
]
keywords = ["knowledge", "retrieval", "ontology", "query-plan"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3.12",
]

dependencies = [
    "fastapi>=0.115.0",
    "uvicorn>=0.32.0",
    "python-multipart>=0.0.12",  # Required for FastAPI form data/upload file support
    "pydantic>=2.0",
    "pydantic-settings>=2.0",
    "boto3>=1.34",
    "numpy>=1.26",
    "networkx>=3.0",
    "matplotlib>=3.7",
    "pypinyin>=0.50",
    "psycopg[binary]>=3.1",  # PostgreSQL driver (psycopg3)
    "psycopg2-binary>=2.9",  # Required for SQLAlchemy connection
    "SQLAlchemy>=2.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "httpx>=0.27",
    "psycopg2-binary>=2.9",  # Fallback for legacy compatibility
    "SQLAlchemy>=2.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/datacloud_knowledge", "src/datacloud_knowledge_service"]


# ============================================
# Ruff 配置
# ============================================
[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "UP", "B", "C4", "SIM", "ASYNC"]
ignore = [
    "E501",   # line too long (handled by formatter)
    "B008",   # function-call in default args — FastAPI's File/Form/Depends pattern
]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

# ============================================
# MyPy 配置
# ============================================
[tool.mypy]
python_version = "3.12"
strict = true
warn_return_any = true
ignore_missing_imports = true

# ============================================
# Pytest 配置
# ============================================
[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
markers = [
    "db_integration: requires reachable PostgreSQL/openGauss database",
]
