[project]
name = "datacloud-knowledge"
version = "0.1.0"
description = "DataCloud Knowledge - 知识检索"
readme = "README.md"
requires-python = ">=3.12"
license = { text = "MIT" }
authors = [
    { name = "Whale DataCloud Team" }
]
keywords = ["knowledge", "retrieval", "ontology", "query-plan"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3.12",
]

dependencies = [
    "fastapi>=0.115.0",
    "uvicorn>=0.32.0",
    "python-multipart>=0.0.12", # Required for FastAPI form data/upload file support
    "pydantic>=2.0",
    "pydantic-settings>=2.0",
    "boto3>=1.34",
    "numpy>=1.26",
    "networkx>=3.0",
    "matplotlib>=3.7",
    "pypinyin>=0.50",
    "psycopg[binary,pool]>=3.1", # PostgreSQL driver (psycopg3) - unified
    "SQLAlchemy>=2.0",
    "rapidfuzz>=3.14.3",
    "llama-index-embeddings-openai>=0.3.0",  # Embedding 服务
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "httpx>=0.27",
    "psycopg2-binary>=2.9",  # Fallback for legacy compatibility
    "SQLAlchemy>=2.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/datacloud_knowledge"]

# ============================================
# Ruff 配置 - 企业级 (2026)
# ============================================
[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
extend-select = [
    "A",     # flake8-builtins - 禁止覆盖内置名
    "ARG",   # flake8-unused-arguments
    "ASYNC", # flake8-async
    "B",     # flake8-bugbear
    "C4",    # flake8-comprehensions
    "DTZ",   # flake8-datetimez - 时区安全
    "E",     # pycodestyle errors
    "F",     # Pyflakes
    "G",     # flake8-logging-format
    "I",     # isort
    "LOG",   # flake8-logging
    "N",     # pep8-naming
    "PERF",  # perflint - 性能优化
    "PGH",   # pygrep-hooks - type:ignore 必须带代码
    "PIE",   # flake8-pie
    "PL",    # pylint
    "PTH",   # flake8-use-pathlib
    "RET",   # flake8-return
    "RUF",   # ruff-specific rules
    "S",     # flake8-bandit - 安全检查
    "SIM",   # flake8-simplify
    "T10",   # flake8-debugger
    "T20",   # flake8-print
    "TC",    # flake8-type-checking
    "TID",   # flake8-tidy-imports
    "TRY",   # tryceratops - 异常处理最佳实践
    "UP",    # pyupgrade - 现代语法
    "W",     # pycodestyle warnings
]
ignore = [
"E501",    # line too long (handled by formatter)
"B008",    # function-call in default args — FastAPI's File/Form/Depends pattern
"PLR0913", # too many arguments — 有时不可避免
"PLR2004", # magic value comparison — 误报太多
    "TRY003",  # long exception messages — 有时更清晰
    "RUF002",  # 中文 docstring 全角字符
    "RUF003",  # 中文 comment 全角字符
]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

# ============================================
# MyPy 配置 - 企业级 (2026)
# ============================================
[tool.mypy]
python_version = "3.12"
strict = true
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
check_untyped_defs = true
ignore_missing_imports = true
namespace_packages = true
show_error_codes = true
enable_error_code = ["ignore-without-code", "redundant-expr", "truthy-bool"]

# ============================================
# Pytest 配置
# ============================================
[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
markers = [
    "db_integration: requires reachable PostgreSQL/openGauss database",
]