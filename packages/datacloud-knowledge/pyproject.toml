[project]
name = "datacloud-knowledge"
version = "0.1.0"
description = "DataCloud Knowledge - 知识检索"
readme = "README.md"
requires-python = ">=3.12"
license = { text = "MIT" }
authors = [
    { name = "Whale DataCloud Team" }
]
maintainers = [
    { name = "Whale DataCloud Team" }
]
keywords = ["knowledge", "retrieval", "ontology", "query-plan"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "License :: OSI Approved :: MIT License",
]

dependencies = []

[project.optional-dependencies]
import = [
    "psycopg[binary]>=3.1",
    "rdflib>=7.0",
]
embedding = [
    "llama-index-embeddings-openai>=0.3.0",
    "pydantic-settings>=2.0",
]
bootstrap = [
    "datacloud-knowledge[import,embedding]",
]
query = [
    "jieba>=0.42.1",
    "numpy>=1.26",
    "pypinyin>=0.50",
    "psycopg[binary,pool]>=3.1",
    "rapidfuzz>=3.14.3",
    "SQLAlchemy>=2.0",
]
file-store = [
    "boto3>=1.34",
    "pydantic>=2.0",
    "pydantic-settings>=2.0",
]
api = [
    "fastapi>=0.115.0",
    "python-multipart>=0.0.12", # Required for FastAPI form data/upload file support
    "uvicorn>=0.32.0",
]
owl-gen = []
visualization = [
    "numpy>=1.26",
    "networkx>=3.0",
    "matplotlib>=3.7",
]
all = [
    "datacloud-knowledge[api,bootstrap,file-store,owl-gen,query,visualization]",
]
dev = [
    "datacloud-knowledge[all]",
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "httpx>=0.27",
    "psycopg2-binary>=2.9",  # Fallback for legacy compatibility
    "SQLAlchemy>=2.0",
    "ruff>=0.8",
    "mypy>=1.13",
]

[dependency-groups]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "httpx>=0.27",
    "psycopg2-binary>=2.9",
    "SQLAlchemy>=2.0",
    "ruff>=0.8",
    "mypy>=1.13",
]

[project.urls]
Homepage = "https://github.com/beyonai/by-datacloud"
Repository = "https://github.com/beyonai/by-datacloud"
Issues = "https://github.com/beyonai/by-datacloud/issues"

[project.scripts]
datacloud-knowledge = "datacloud_knowledge.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/datacloud_knowledge"]

[tool.hatch.build.targets.wheel.force-include]
"db/ddl/knowledge" = "datacloud_knowledge/resources/sql/ddl"
"db/seed/knowledge" = "datacloud_knowledge/resources/sql/seed"
"db/migrations" = "datacloud_knowledge/resources/sql/migrations"

[tool.uv]
default-groups = ["dev"]

# ============================================
# Pytest 配置
# ============================================
[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
markers = [
    "db_integration: requires reachable PostgreSQL/openGauss database",
]
